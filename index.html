<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Hunt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container hero-grid">
      <div>
        <p class="eyebrow">Sequential puzzle hunt</p>
        <h1>Puzzle Hunt</h1>
        <p class="muted hero-copy">Solve each rectangular puzzle card to reveal the next challenge. After all 11 puzzles are solved, the metapuzzle appears.</p>
      </div>
      <aside class="status-panel" aria-label="Hunt progress">
        <p id="progressText" class="progress"></p>
        <p id="revealText" class="muted"></p>
        <button id="resetBtn" class="secondary">Reset progress</button>
      </aside>
    </div>
  </header>

  <main class="container">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Puzzle board</p>
        <h2>Available puzzles</h2>
      </div>
      <p class="muted">Future cells stay hidden until the current puzzle is solved.</p>
    </div>
    <ul id="puzzleList" class="gallery"></ul>
  </main>

  <script src="app.js"></script>
</body>
</html>
